# Preferred pane layouts by pane count, used by scripts/grid-layout.py
# (bound to: prefix + Space).
#
# Format:  <pane-count> = <col1> <col2> ...
#   Each number is how many panes (rows) stack in that column, left to right.
#   The numbers must sum to <pane-count>.
#
#   Examples:
#     "1 1 1" -> three full-height columns (vertical bars)
#     "2 2"   -> two columns of two -> 2x2 grid
#     "2 2 1" -> 2x2 plus a full-height third column
#     "2 2 2" -> three columns of two -> 2x3 grid
#
# Counts not listed here fall back to a balanced grid
# (columns = ceil(sqrt(n)), panes spread as evenly as possible).

2 = 1 1
3 = 1 1 1
4 = 2 2
5 = 2 2 1
6 = 2 2 2
