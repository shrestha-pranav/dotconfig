# show status bar at bottom for remote session,
# so it do not stack together with local session's one
set -g status-position bottom

# Set port of SSH remote tunnel, where tmux will pipe buffers to transfer on local machine for copy
set -g @copy_backend_remote_tunnel_port 11988

set -g status-left "$wg_session"
set -g status-right "$wg_prefix $wg_is_keys_off $wg_is_zoomed #{sysstat_cpu} | #{sysstat_mem} | $wg_user_host | $wg_date"

# GPU utilization, appended only on machines with nvidia-smi (probed once at load)
if-shell 'command -v nvidia-smi >/dev/null 2>&1' \
    'set -ag status-right " | GPU:#(nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | head -1)%"'
